<!DOCTYPE html>
<html>
<head>
    <title>Z-Index Example</title>
    <style>
        .div1{
            width:150px;
            height:150px;
            background-color:red;
            position:absolute;
            top:50px;
            left:50px;
            z-index:1;
            display: flex;
        }

        .div2{
            width:150px;
            height:150px;
            background-color:rgb(255, 132, 0);
            position:absolute;
            top:100px;
            left:100px;
            z-index:2;
            display: block;
        }

        .div3{
            width:150px;
            height:150px;
            background-color:rgb(0, 0, 128);
            position:absolute;
            top:150px;
            left:150px;
            z-index:3;
        }
    </style>
</head>
<body>

    <div class="div1">Div 1</div>

    <div class="div2">Div 2</div>

    <div class="div3">Div 3</div>

</body>
</html>
