<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GadgetMart - Product Showcase</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            font-size: 18px;
            background-color: #f4f4f4;
            color: black;
        }

        header{
            background-color: navy;
            color: white;
            text-align: center;
            font-size: 30px;
        }

        .card{
            background-color: white;
            margin: 20px;
            padding: 15px;
        }

        .title{
            color: darkblue;
            font-size: 24px;
        }

        .price{
            color: green;
            font-size: 22px;
        }
    </style>
</head>
<body>

    <!-- Name: Vaibhav Tyagi
         Roll No: __2502901520392__ -->

    <header>
        <h1>GadgetMart</h1>
        <p>Your Smart Gadget Store</p>
    </header>

    <main>

        <figure class="card">
            <img src="https://via.placeholder.com/250x150"
                 alt="Smartphone Image">

            <figcaption class="title">
                Samsung Galaxy Smartphone
            </figcaption>

            <p class="price">₹24,999</p>

            <ul>
                <li>6.5 Inch Display</li>
                <li>128GB Storage</li>
                <li>5000mAh Battery</li>
            </ul>
        </figure>

        <figure class="card">
            <img src="https://via.placeholder.com/250x150"
                 alt="Laptop Image">

            <figcaption class="title">
                HP Laptop
            </figcaption>

            <p class="price">₹54,999</p>

            <ul>
                <li>Intel Core i5</li>
                <li>16GB RAM</li>
                <li>512GB SSD</li>
            </ul>
        </figure>

    </main>

</body>
</html>
