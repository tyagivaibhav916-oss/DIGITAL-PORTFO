<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Spice Route Restaurant - Digital Menu</title>

<style>
    body{
        font-family: Arial, sans-serif;
        font-size:18px;
        background-color:#fdf6e3;
        color:#333;
        text-align:center;
    }

    h1{
        background-color:#d35400;
        color:white;
        padding:15px;
    }

    table{
        margin:auto;
        width:80%;
        border-collapse:collapse;
        background-color:white;
    }

    caption{
        font-size:28px;
        font-weight:bold;
        margin:10px;
        color:#d35400;
    }

    th{
        background-color:#d35400;
        color:white;
        padding:12px;
        border:1px solid black;
    }

    td{
        padding:10px;
        border:1px solid black;
    }

    tr:nth-child(even){
        background-color:#f9e79f;
    }
</style>
</head>

<body>

<h1>Spice Route Restaurant</h1>

<table>
    <caption>Digital Menu</caption>

    <tr>
        <th>Dish</th>
        <th>Category</th>
        <th>Price (₹)</th>
    </tr>

    <tr>
        <td>Paneer Butter Masala</td>
        <td>Main Course</td>
        <td>250</td>
    </tr>

    <tr>
        <td>Veg Biryani</td>
        <td>Rice</td>
        <td>220</td>
    </tr>

    <tr>
        <td>Masala Dosa</td>
        <td>South Indian</td>
        <td>120</td>
    </tr>

    <tr>
        <td>Cold Coffee</td>
        <td>Beverage</td>
        <td>90</td>
    </tr>

    <tr>
        <td>Gulab Jamun</td>
        <td>Dessert</td>
        <td>80</td>
    </tr>
</table>

</body>
</html>
