<!DOCTYPE html>
<html>
<head>
    <title>Header Footer Page</title>
    <style>
        header{
            background-color: lightgray;
            padding: 20px;
        }

        .logo{
            width: 80px;
            height: 80px;
            background-color: green;
            border-radius: 50%;
            display: inline-block;
        }

        a{
            margin-left: 20px;
            text-decoration: none;
        }

        .container{
            margin-top: 30px;
            text-align: center;
        }

        .box{
            width: 100px;
            height: 100px;
            background-color: lightblue;
            display: inline-block;
            margin: 10px;
            border: 1px solid black;
        }

        footer{
            background-color: lightgray;
            text-align: center;
            padding: 20px;
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"></div>

        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </header>

    <div class="container">
        <div class="box">Div 1</div>
        <div class="box">Div 2</div>
        <div class="box">Div 3</div>
    </div>

    <footer>
        Footer Area
    </footer>

</body>
</html>
