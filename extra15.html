<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="bootrstrap" href="bootstrap.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Position Example</title>

<style>
    body{
        margin:0;
        padding:20px;
        background-color:#f4f4f4;
        font-family:Arial, sans-serif;
    }

    .container{
        position:relative;
        height:500px;
        border:3px solid black;
        background-color:white;
    }

    /* 1. Static Position */
    .box1{
        position:static;
        width:150px;
        height:100px;
        background-color:tomato;
        color:white;
        text-align:center;
        line-height:100px;
        font-size:20px;
        border-radius:10px;
    }

    /* 2. Relative Position */
    .box2{
        position:relative;
        left:200px;
        top:20px;
        width:150px;
        height:100px;
        background-color:royalblue;
        color:white;
        text-align:center;
        line-height:100px;
        font-size:20px;
        border-radius:10px;
    }

    /* 3. Absolute Position */
    .box3{
        position:absolute;
        right:30px;
        top:150px;
        width:150px;
        height:100px;
        background-color:green;
        color:white;
        text-align:center;
        line-height:100px;
        font-size:20px;
        border-radius:10px;
    }

    /* 4. Fixed Position */
    .box4{
        position:fixed;
        bottom:20px;
        right:20px;
        width:150px;
        height:100px;
        background-color:purple;
        color:white;
        text-align:center;
        line-height:100px;
        font-size:20px;
        border-radius:10px;
    }
</style>
</head>
<body>

<h1>CSS Position Properties</h1>

<div class="container">
    <div class="box1">Static</div>
    <div class="box2">Relative</div>
    <div class="box3">Absolute</div>
    <div class="box4">Fixed</div>
</div>

</body>
</html>
